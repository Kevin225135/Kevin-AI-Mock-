name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  APP_NAME: ai-mock-interview-coach
  NODE_VERSION: "22"
  NEXT_TELEMETRY_DISABLED: "1"
  RELEASE_ARCHIVE: release.tar.gz

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.BUILD_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/ai_mock_coach?schema=public' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build Next.js app
        run: npm run build

      - name: Package standalone release
        shell: bash
        run: |
          set -euo pipefail

          test -f .next/standalone/server.js

          rm -rf release
          mkdir -p release
          cp -R .next/standalone/. release/
          mkdir -p release/.next
          cp -R .next/static release/.next/static

          if [ -d public ]; then
            cp -R public release/public
          fi

          cp deploy/ecosystem.config.cjs release/ecosystem.config.cjs
          tar -C release -czf "$RELEASE_ARCHIVE" .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-release
          path: ${{ env.RELEASE_ARCHIVE }}
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: production-release

      - name: Validate deployment secrets
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          set -euo pipefail

          missing=0
          for name in SSH_HOST SSH_USER SSH_PRIVATE_KEY DEPLOY_PATH PRODUCTION_ENV; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing secret::$name is required."
              missing=1
            fi
          done

          exit "$missing"

      - name: Configure SSH
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          SSH_PORT="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -n "$SSH_KNOWN_HOSTS" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Upload release
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          set -euo pipefail

          SSH_PORT="${SSH_PORT:-22}"
          remote_archive="/tmp/${APP_NAME}-${GITHUB_SHA}.tar.gz"
          remote_env="/tmp/${APP_NAME}-${GITHUB_SHA}.env"

          umask 077
          printf '%s\n' "$PRODUCTION_ENV" > production.env

          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" "$RELEASE_ARCHIVE" "$SSH_USER@$SSH_HOST:$remote_archive"
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" production.env "$SSH_USER@$SSH_HOST:$remote_env"

      - name: Activate release
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
        run: |
          set -euo pipefail

          SSH_PORT="${SSH_PORT:-22}"
          PM2_APP_NAME="${PM2_APP_NAME:-$APP_NAME}"
          remote_archive="/tmp/${APP_NAME}-${GITHUB_SHA}.tar.gz"
          remote_env="/tmp/${APP_NAME}-${GITHUB_SHA}.env"

          quote() {
            printf "'%s'" "$(printf '%s' "$1" | sed "s/'/'\\\\''/g")"
          }

          remote_prefix="APP_NAME=$(quote "$APP_NAME") DEPLOY_PATH=$(quote "$DEPLOY_PATH") RELEASE_SHA=$(quote "$GITHUB_SHA") REMOTE_ARCHIVE=$(quote "$remote_archive") REMOTE_ENV=$(quote "$remote_env") PM2_APP_NAME=$(quote "$PM2_APP_NAME")"

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "$remote_prefix bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          if ! command -v node >/dev/null 2>&1; then
            echo "Node.js is required on the server." >&2
            exit 1
          fi

          if ! command -v pm2 >/dev/null 2>&1; then
            echo "PM2 is required on the server. Install it with: npm install -g pm2" >&2
            exit 1
          fi

          mkdir -p "$DEPLOY_PATH/releases"
          release_dir="$DEPLOY_PATH/releases/$RELEASE_SHA"
          rm -rf "$release_dir"
          mkdir -p "$release_dir"

          tar -xzf "$REMOTE_ARCHIVE" -C "$release_dir"
          mv "$REMOTE_ENV" "$release_dir/.env.production"
          chmod 600 "$release_dir/.env.production"
          rm -f "$REMOTE_ARCHIVE"

          ln -sfnT "$release_dir" "$DEPLOY_PATH/current"
          cd "$DEPLOY_PATH/current"

          export PM2_APP_NAME
          pm2 startOrReload ecosystem.config.cjs --only "$PM2_APP_NAME" --update-env
          pm2 save

          cd "$DEPLOY_PATH/releases"
          ls -1dt -- */ 2>/dev/null | tail -n +6 | xargs -r rm -rf --
          REMOTE_SCRIPT
